        function detectDocumentTypes(fileName, content) {
            const detected = [];
            const lowerName = fileName.toLowerCase();
            const lowerContent = (content || '').toLowerCase().substring(0, 5000);

            for (const [typeId, typeInfo] of Object.entries(DOCUMENT_TYPES)) {
                const score = typeInfo.keywords.reduce((acc, kw) => {
                    const kwLower = kw.toLowerCase();
                    if (lowerName.includes(kwLower)) acc += 3;
                    if (lowerContent.includes(kwLower)) acc += 1;
                    return acc;
                }, 0);

                if (score >= 2) {
                    detected.push({ typeId, ...typeInfo, score });
                }
            }

            return detected.sort((a, b) => b.score - a.score);
        }

        function extractCompanyName(fileName) {
            const patterns = [
                /^([A-Za-z\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]+?)[-_]/,
                /【(.+?)】/,
                /\((.+?)\)/,
                /^(\w+)[-_\s]/
            ];

            for (const pattern of patterns) {
                const match = fileName.match(pattern);
                if (match && match[1] && match[1].length >= 2 && match[1].length <= 20) {
                    return match[1];
                }
            }
            return null;
        }

        function updateLearningFromAnalysis(analyzedFiles, fileContents) {
            const docTypeCount = {};
            const companies = new Set();

            analyzedFiles.forEach(file => {
                const content = fileContents[file.name] || '';

                types.forEach(t => {
                    docTypeCount[t.typeId] = (docTypeCount[t.typeId] || 0) + 1;
                });

                const company = extractCompanyName(file.name);
                if (company) companies.add(company);

                state.currentSessionLearning.files.push({
                    name: file.name,
                    types: types.map(t => t.typeId),
                    company,
                    contentLength: content.length
                });
            });

            state.detectedDocTypes = Object.entries(docTypeCount)
                .map(([typeId, count]) => ({ typeId, ...DOCUMENT_TYPES[typeId], count }))
                .sort((a, b) => b.count - a.count);

            learningData.totalAnalyzedFiles += analyzedFiles.length;

            companies.forEach(company => {
                if (!learningData.companyProfiles[company]) {
                    learningData.companyProfiles[company] = { fileCount: 0, docTypes: {} };

                learningData.companyProfiles[company].fileCount++;

            state.detectedDocTypes.forEach(dt => {

                if (existing) {
                    existing.count += dt.count;
                } else {
                    learningData.documentPatterns.push({ typeId: dt.typeId, count: dt.count });
                }
            });

            saveLearningData();
            generateAnalysisProposals();
        }

        function formatFileSize(bytes) {
            if (!bytes) return '-';
            if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return bytes + ' B';
        }

        function delay(ms) {

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;

        async function parseExcelContent(arrayBuffer, fileName) {
            try {
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                let content = `【Excelファイル: ${fileName}】\n`;
                content += `シート数: ${workbook.SheetNames.length}\n\n`;

                workbook.SheetNames.forEach((sheetName, idx) => {
                    const sheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                    content += `=== シート${idx + 1}: ${sheetName} ===\n`;
                    content += `行数: ${jsonData.length}\n`;

                    jsonData.forEach((row, rowIdx) => {
                        if (row.some(cell => cell !== '')) {
                            content += `行${rowIdx + 1}: ${row.join(' | ')}\n`;
                        }
                    });
                    content += '\n';
                });

                return content;
            } catch (e) {
                console.error('Excel parse error:', e);
                return `【Excel解析エラー】${fileName}: ${e.message}`;
            }
        }

        async function parsePdfContent(arrayBuffer, fileName) {
            try {
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let content = `【PDFファイル: ${fileName}】\n`;
                content += `ページ数: ${pdf.numPages}\n\n`;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    content += `=== ページ ${i} ===\n${pageText}\n\n`;
                }

                return content;
            } catch (e) {
                console.error('PDF parse error:', e);
                return `【PDF解析エラー】${fileName}: ${e.message}`;
            }
        }

        async function parseTextContent(arrayBuffer, fileName) {
            try {
                const decoder = new TextDecoder('utf-8');
                let text = decoder.decode(arrayBuffer);

                if (text.includes('�')) {
                    const sjisDecoder = new TextDecoder('shift-jis');
                    text = sjisDecoder.decode(arrayBuffer);
                }

                return `【テキストファイル: ${fileName}】\n\n${text}`;
            } catch (e) {
                return `【テキスト解析エラー】${fileName}: ${e.message}`;
            }
        }

        async function parseZipContent(arrayBuffer, fileName) {
            try {
                const zip = await JSZip.loadAsync(arrayBuffer);
                let content = `【ZIPファイル: ${fileName}】\n`;
                const fileList = Object.keys(zip.files);
                content += `含まれるファイル数: ${fileList.length}\n\n`;

                for (const name of fileList) {
                    const file = zip.files[name];
                    if (file.dir) continue;

                    content += `--- ${name} ---\n`;

                    try {
                        const ext = name.split('.').pop().toLowerCase();
                        const fileData = await file.async('arraybuffer');

                        if (['xlsx', 'xls', 'csv'].includes(ext)) {
                            const excelContent = await parseExcelContent(fileData, name);
                            content += excelContent + '\n';
                        } else if (ext === 'pdf') {
                            const pdfContent = await parsePdfContent(fileData, name);
                            content += pdfContent + '\n';
                        } else if (['txt', 'md', 'json', 'csv', 'html', 'xml'].includes(ext)) {
                            const textContent = await parseTextContent(fileData, name);
                            content += textContent + '\n';
                        } else {
                            content += `(バイナリファイル: ${formatFileSize(fileData.byteLength)})\n`;
                        }
                    } catch (e) {
                        content += `(解析エラー: ${e.message})\n`;
                    }
                }

                return content;
            } catch (e) {
                console.error('ZIP parse error:', e);
                return `【ZIP解析エラー】${fileName}: ${e.message}`;
            }
        }

        async function parseCsvContent(arrayBuffer, fileName) {
            try {
                const decoder = new TextDecoder('utf-8');
                let text = decoder.decode(arrayBuffer);

                if (text.includes('�')) {
                    const sjisDecoder = new TextDecoder('shift-jis');
                    text = sjisDecoder.decode(arrayBuffer);
                }

                const lines = text.split('\n');
                let content = `【CSVファイル: ${fileName}】\n`;
                content += `行数: ${lines.length}\n\n`;

                lines.forEach((line, idx) => {
                    if (line.trim()) {
                        content += `行${idx + 1}: ${line}\n`;
                    }
                });

                return content;
            } catch (e) {
                return `【CSV解析エラー】${fileName}: ${e.message}`;
            }
        }

        async function parseFileContent(arrayBuffer, fileName, mimeType) {
            const ext = fileName.split('.').pop().toLowerCase();

            if (['xlsx', 'xls'].includes(ext) || mimeType?.includes('spreadsheet')) {
                return await parseExcelContent(arrayBuffer, fileName);
            } else if (ext === 'csv') {
                return await parseCsvContent(arrayBuffer, fileName);
            } else if (ext === 'pdf' || mimeType === 'application/pdf') {
                return await parsePdfContent(arrayBuffer, fileName);
            } else if (ext === 'zip' || mimeType === 'application/zip') {
                return await parseZipContent(arrayBuffer, fileName);
            } else if (['txt', 'md', 'json', 'html', 'xml'].includes(ext)) {
                return await parseTextContent(arrayBuffer, fileName);
            } else if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'].includes(ext) || mimeType?.startsWith('image/')) {
                return `【画像ファイル: ${fileName}】\nファイルサイズ: ${formatFileSize(arrayBuffer.byteLength)}\nMIMEタイプ: ${mimeType || '不明'}\n※この画像はAI分析対象としてアップロードされます`;
            } else if (['mov', 'avi', 'webm', 'mkv'].includes(ext) || (mimeType?.startsWith('video/') && !mimeType.includes('mp4'))) {
                return `【動画ファイル: ${fileName}】\nファイルサイズ: ${formatFileSize(arrayBuffer.byteLength)}\nMIMEタイプ: ${mimeType || '不明'}\n※この動画はAI分析対象としてアップロードされます`;
            } else {
                return `【ファイル: ${fileName}】\n(このファイル形式のテキスト抽出は未対応です)\nサイズ: ${formatFileSize(arrayBuffer.byteLength)}`;
            }
        }

        async function uploadMediaToRagStore(storeName, arrayBuffer, fileName, mimeType) {
            const blob = new Blob([arrayBuffer], { type: mimeType });
            const safeName = fileName.replace(/[^\x00-\x7F]/g, '_');
            await uploadToRagStore(storeName, new File([blob], safeName, { type: mimeType }));
        }

        // ===========================================

        function initializeGoogleAuth() {
            return new Promise((resolve, reject) => {
                if (!GOOGLE_CLIENT_ID) {
                    reject(new Error('GOOGLE_CLIENT_ID が設定されていません'));
                    return;
                }
                try {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: GOOGLE_CLIENT_ID,
                        scope: SCOPES,
                        callback: (response) => {
                            if (response.error) {
                                reject(new Error(response.error));
                                return;
                            }
                            state.googleAccessToken = response.access_token;
                            state.isGoogleSignedIn = true;
                            resolve(response);
                        },
                    });
                    resolve();
                } catch (err) {
                    reject(err);
                }
            });
        }

        function signInWithGoogle() {
            return new Promise((resolve, reject) => {
                if (!tokenClient) {
                    reject(new Error('Google Auth not initialized'));
                    return;
                }
                tokenClient.callback = (response) => {
                    if (response.error) {
                        reject(new Error(response.error));
                        return;
                    }
                    state.googleAccessToken = response.access_token;
                    state.isGoogleSignedIn = true;
                    resolve(response);
                };
                tokenClient.requestAccessToken({ prompt: 'consent' });
            });
        }

        // フォルダ内のファイルを再帰的に取得
        async function fetchAllFilesRecursively(driveId, folderId = null, parentPath = '') {
            const allFiles = [];
            let pageToken = null;

            do {
                const params = new URLSearchParams({
                    q: folderId 
                        ? `'${folderId}' in parents and trashed = false`
                        : 'trashed = false',
                    pageSize: '200',
                    fields: 'nextPageToken, files(id, name, mimeType, size, modifiedTime, webViewLink, parents)',
                    orderBy: 'modifiedTime desc',
                    supportsAllDrives: 'true',
                    includeItemsFromAllDrives: 'true',
                });

                if (driveId) {
                    params.append('driveId', driveId);
                    params.append('corpora', 'drive');
                }
                if (pageToken) params.append('pageToken', pageToken);

                const response = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`, {
                    headers: { 'Authorization': `Bearer ${state.googleAccessToken}` }
                });

                if (!response.ok) throw new Error('Failed to fetch files');
                const data = await response.json();
                const files = data.files || [];

                for (const file of files) {
                    const filePath = parentPath ? `${parentPath}/${file.name}` : file.name;
                    
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        // フォルダの場合は再帰的に取得
                        state.loadingProgress.message = `フォルダ読み込み中: ${file.name}`;
                        render();
                        
                        const subFiles = await fetchAllFilesRecursively(driveId, file.id, filePath);
                        allFiles.push(...subFiles);
                    } else {
                        // ファイルの場合はリストに追加
                        allFiles.push({
                            ...file,
                            path: filePath,
                            parentFolder: parentPath || 'ルート'
                        });
                        state.loadingProgress.current = allFiles.length;
                        
                        if (allFiles.length % 50 === 0) {
                            render();
                        }
                    }
                }

                pageToken = data.nextPageToken;
            } while (pageToken);

            return allFiles;
        }

        // ZIP内のファイル情報を取得（ダウンロードせずに）
        function getZipContentInfo(fileName) {
            // ファイル名からZIP内容を推測
            const ext = fileName.split('.').pop().toLowerCase();
            if (ext !== 'zip') return null;

            // ファイル名からキーワードを抽出

            const yearMatch = fileName.match(/20\d{2}/);

            return {

        // 高速並列ダウンロード
        async function downloadDriveFile(fileId, mimeType, fileName) {
            const exportFormats = {
                'application/vnd.google-apps.document': 'application/pdf',
                'application/vnd.google-apps.spreadsheet': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'application/vnd.google-apps.presentation': 'application/pdf',
            };

            let url;
            let targetMimeType = mimeType;

            if (exportFormats[mimeType]) {
                targetMimeType = exportFormats[mimeType];
                url = `https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=${encodeURIComponent(targetMimeType)}`;
            } else {
                url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
            }

            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${state.googleAccessToken}` }
            });

            if (!response.ok) throw new Error(`Download failed: ${response.status}`);

            const arrayBuffer = await response.arrayBuffer();
            return { arrayBuffer, mimeType: targetMimeType, fileName };
        }

        async function generateExampleQuestions(storeName, fileContents) {
            try {
                const contentSummary = Object.entries(fileContents)
                    .slice(0, 5)
                    .map(([name, content]) => `${name}: ${content.substring(0, 500)}`)
                    .join('\n\n');

                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: `以下の資料内容を分析し、ユーザーが知りたいであろう具体的で実用的な質問を5つ生成してください。
データの分析、比較、ボトルネック発見、改善提案に関する質問を含めてください。
必ず文字列の配列としてJSON形式で返してください。例: ["質問1", "質問2", "質問3"]

資料の内容サンプル:
${contentSummary}`,
                    config: { tools: [{ fileSearch: { fileSearchStoreNames: [storeName] } }] }
                });

                const text = response.text.trim();
                const match = text.match(/\[[\s\S]*\]/);
                if (match) {
                    const parsed = JSON.parse(match[0]);
                    return parsed.map(item => {
                        if (typeof item === 'string') return item;
                        if (typeof item === 'object' && item !== null) {
                            return item.question || item.text || item.content || JSON.stringify(item);
                        }
                        return String(item);
                    });
                }
                return [];
            } catch (e) {
                console.error('Question generation error:', e);
                return ['このデータの概要を教えてください', 'ボトルネックや問題点を分析してください', '改善点を提案してください'];
            }
        }

                    <div class="max-w-4xl mx-auto p-4 space-y-4">
                        ${state.chatHistory.length === 0 ? `

                            <div class="w-20 h-20 bg-gradient-to-br from-primary/10 to-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-4">

                        ${state.chatHistory.map((msg, msgIdx) => `
                        <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} fade-in">
                            <div class="max-w-3xl ${msg.role === 'user' ? 'bg-gradient-to-r from-primary to-accent text-white' : 'bg-white shadow-sm'} px-5 py-4 rounded-2xl">

                                    ${msg.sources.slice(0, 5).map((s, i) => `

                                        <div class="mt-1 p-2 ${msg.role === 'user' ? 'bg-white/10' : 'bg-gray-50'} rounded text-xs max-h-32 overflow-y-auto">${escapeHtml(s).substring(0, 500)}...</div>

                                    <button class="feedbackBtn px-2 py-1 text-xs bg-green-50 hover:bg-green-100 text-green-600 rounded" data-helpful="true" data-query="${escapeHtml(state.chatHistory[msgIdx - 1]?.content || '')}">👍 はい</button>
                                    <button class="feedbackBtn px-2 py-1 text-xs bg-gray-50 hover:bg-gray-100 text-gray-600 rounded" data-helpful="false" data-query="${escapeHtml(state.chatHistory[msgIdx - 1]?.content || '')}">👎 いいえ</button>

                        `).join('')}
                        
                        ${state.isLoading ? `
                        <div class="flex justify-start fade-in">

                                <div class="flex gap-1">
                                    <div class="w-2 h-2 bg-primary rounded-full animate-bounce"></div>

                <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t p-4">
                    <div class="max-w-4xl mx-auto">

                        <div class="mb-3 flex flex-wrap gap-2">

                                    ${escapeHtml(q)}

                        </div>
                        ` : ''}
                        <form id="chatForm" class="flex gap-3">
                            <input type="text" id="chatInput" placeholder="資料について質問（例: ボトルネックを3つ探して）" 
                                class="flex-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-primary outline-none"
                                ${state.isLoading ? 'disabled' : ''}/>
                            <button type="submit" class="p-3 bg-gradient-to-r from-primary to-accent text-white rounded-xl ${state.isLoading ? 'opacity-50' : ''}" ${state.isLoading ? 'disabled' : ''}>

                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>

        function formatResponse(text) {
            return escapeHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function renderError() {
            return `
            <div class="min-h-screen flex items-center justify-center p-4">
                <div class="text-center fade-in">
                    <div class="text-6xl mb-4">⚠️</div>
                    <h2 class="text-2xl font-bold mb-2 text-red-600">エラー</h2>
                    <p class="text-text-muted mb-6 max-w-md">${escapeHtml(state.error)}</p>
                    <button id="retryBtn" class="px-6 py-3 bg-primary text-white rounded-xl">再試行</button>
                </div>
            </div>`;
        }

        // ===========================================
        // イベントリスナー
        // ===========================================
        function attachEventListeners() {
            const geminiKeyInput = document.getElementById('geminiKeyInput');
            if (geminiKeyInput) {
                geminiKeyInput.addEventListener('input', e => {
                    state.geminiApiKey = e.target.value;
                    try { localStorage.setItem('gemini_api_key', state.geminiApiKey); } catch (err) { }
                    render();
                });
            }

            const googleSignInBtn = document.getElementById('googleSignInBtn');
            if (googleSignInBtn) googleSignInBtn.addEventListener('click', handleGoogleSignIn);

            const startBtn = document.getElementById('startBtn');
            if (startBtn) startBtn.addEventListener('click', handleStart);

            document.querySelectorAll('.driveBtn').forEach(btn => {
                btn.addEventListener('click', () => handleSelectDrive(btn.dataset.id, btn.dataset.name));
            });

            const backToWelcome = document.getElementById('backToWelcome');
            if (backToWelcome) backToWelcome.addEventListener('click', () => { state.screen = 'welcome'; render(); });

            const backToDrives = document.getElementById('backToDrives');
            if (backToDrives) backToDrives.addEventListener('click', () => { state.screen = 'driveSelect'; render(); });

            const refreshFiles = document.getElementById('refreshFiles');
            if (refreshFiles) refreshFiles.addEventListener('click', loadDriveFiles);

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            if (searchInput) searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });
            if (searchBtn) searchBtn.addEventListener('click', handleSearch);

            const selectAll = document.getElementById('selectAll');
            if (selectAll) {
                selectAll.addEventListener('click', () => {
                    state.filteredFiles.forEach(f => {
                        if (!state.selectedFiles.includes(f.id)) state.selectedFiles.push(f.id);
                    });
                    render();
                });
            }

            const selectAnalyzable = document.getElementById('selectAnalyzable');
            if (selectAnalyzable) {
                selectAnalyzable.addEventListener('click', () => {
                    state.filteredFiles.forEach(f => {
                        const typeInfo = getFileTypeInfo(f.mimeType, f.name);
                        if (typeInfo.canAnalyze && !state.selectedFiles.includes(f.id)) {
                            state.selectedFiles.push(f.id);
                        }
                    });
                    render();
                });
            }

            document.querySelectorAll('.fileCard').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    const idx = state.selectedFiles.indexOf(id);
                    if (idx === -1) state.selectedFiles.push(id);
                    else state.selectedFiles.splice(idx, 1);
                    render();
                });
            });

            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            if (dropZone && fileInput) {
                dropZone.addEventListener('click', () => fileInput.click());
                dropZone.addEventListener('dragover', e => { e.preventDefault(); });
                dropZone.addEventListener('drop', e => {
                    e.preventDefault();
                    if (e.dataTransfer.files.length) {
                        state.uploadedFiles = [...state.uploadedFiles, ...Array.from(e.dataTransfer.files)];
                        render();
                    }
                });
                fileInput.addEventListener('change', e => {
                    if (e.target.files.length) {
                        state.uploadedFiles = [...state.uploadedFiles, ...Array.from(e.target.files)];
                        render();
                    }
                });
            }

            document.querySelectorAll('.removeFile').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    state.uploadedFiles.splice(parseInt(btn.dataset.idx), 1);
                    render();
                });
            });

            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) resetBtn.addEventListener('click', () => {
                state.uploadedFiles = [];
                state.selectedFiles = [];
                render();
            });

            const confirmBtn = document.getElementById('confirmBtn');
            if (confirmBtn) confirmBtn.addEventListener('click', handleConfirm);

            const chatForm = document.getElementById('chatForm');
            if (chatForm) chatForm.addEventListener('submit', handleChat);

            const newChatBtn = document.getElementById('newChatBtn');
            if (newChatBtn) newChatBtn.addEventListener('click', () => {
                state.screen = 'fileSelect';
                state.chatHistory = [];
                state.selectedFiles = [];
                state.uploadedFiles = [];
                state.downloadedFiles = [];
                state.analyzedFiles = [];
                state.fileContents = {};
                state.detectedDocTypes = [];
                state.analysisProposals = [];
                state.showLearningPanel = false;
                state.currentSessionLearning = { files: [], queries: [], feedbacks: [] };
                render();
            });

            document.querySelectorAll('.suggestion').forEach(btn => {
                btn.addEventListener('click', () => {
                    const input = document.getElementById('chatInput');
                    if (input) input.value = btn.textContent.trim();
                });
            });

            const toggleLearningPanel = document.getElementById('toggleLearningPanel');
            if (toggleLearningPanel) {
                toggleLearningPanel.addEventListener('click', () => {
                    state.showLearningPanel = !state.showLearningPanel;
                    render();
                });
            }

            const showLearningBtn = document.getElementById('showLearningBtn');
            if (showLearningBtn) {
                showLearningBtn.addEventListener('click', () => {
                    state.showLearningPanel = !state.showLearningPanel;
                    render();
                });
            }

            document.querySelectorAll('.proposalQuestion').forEach(btn => {
                btn.addEventListener('click', () => {
                    const question = btn.dataset.question;
                    const input = document.getElementById('chatInput');
                    if (input && question) {
                        input.value = question;
                        input.focus();
                    }
                });
            });

            document.querySelectorAll('.feedbackBtn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const isHelpful = btn.dataset.helpful === 'true';
                    const query = btn.dataset.query;
                    if (query) {
                        recordQueryFeedback(query, isHelpful);
                        btn.parentElement.innerHTML = `<span class="text-xs text-gray-400">フィードバックありがとうございます ${isHelpful ? '🎉' : '📝'}</span>`;
                    }
                });
            });

            const retryBtn = document.getElementById('retryBtn');
            if (retryBtn) retryBtn.addEventListener('click', () => { state.error = null; state.screen = 'welcome'; render(); });
        }

        // ===========================================
        // ハンドラ
        // ===========================================
        async function handleGoogleSignIn() {
            try {
                await initializeGoogleAuth();
                await signInWithGoogle();
                render();
            } catch (e) {
                console.error('Google Sign In Error:', e);
                alert('Google認証エラー: ' + e.message);
            }
        }

        async function handleStart() {
            if (!state.geminiApiKey || !state.isGoogleSignedIn) return;

            try {
                initializeGemini(state.geminiApiKey);
                state.isLoading = true;
                state.screen = 'driveSelect';
                render();

                state.sharedDrives = await fetchSharedDrives();
                state.isLoading = false;
                render();
            } catch (e) {
                state.error = e.message;
                state.screen = 'error';
                render();
            }
        }

        async function handleSelectDrive(driveId, driveName) {
            state.selectedDrive = { id: driveId, name: driveName };
            state.screen = 'fileSelect';
            await loadDriveFiles();
        }

        async function loadDriveFiles() {
            state.isLoadingFiles = true;
            state.loadingProgress = { current: 0, total: 0, message: 'フォルダをスキャン中...' };
            render();

            try {
                // フォルダ内のファイルを再帰的に取得
                const allFiles = await fetchAllFilesRecursively(state.selectedDrive.id);
                
                state.files = allFiles.map(f => {
                    const typeInfo = getFileTypeInfo(f.mimeType, f.name);
                    return {
                        ...f,
                        typeInfo: typeInfo,
                        sizeFormatted: f.size ? formatFileSize(parseInt(f.size)) : (typeInfo.category === 'folder' ? '-' : 'サイズ不明')
                    };
                });

                // フォルダを除外してソート（分析可能なものを上に）
                state.filteredFiles = [...state.files]
                    .filter(f => f.typeInfo.category !== 'folder')
                    .sort((a, b) => {
                        if (a.typeInfo.canAnalyze && !b.typeInfo.canAnalyze) return -1;
                        if (!a.typeInfo.canAnalyze && b.typeInfo.canAnalyze) return 1;
                        return 0;
                    });
            } catch (e) {
                console.error('Error loading files:', e);
                state.error = 'ファイル読み込みエラー: ' + e.message;
            }

            state.isLoadingFiles = false;
            render();
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            if (!input) return;
            const query = input.value.trim().toLowerCase();

            // フォルダを除外
            let filtered = state.files.filter(f => f.typeInfo?.category !== 'folder');

            if (query) {
                filtered = filtered.filter(f => {
                    const nameMatch = f.name.toLowerCase().includes(query);
                    const pathMatch = f.path?.toLowerCase().includes(query);
                    return nameMatch || pathMatch;
                });
            }

            // 分析可能なものを上に
            filtered.sort((a, b) => {
                if (a.typeInfo?.canAnalyze && !b.typeInfo?.canAnalyze) return -1;
                if (!a.typeInfo?.canAnalyze && b.typeInfo?.canAnalyze) return 1;
                return 0;
            });

            state.filteredFiles = filtered;
            render();
        }

        async function handleConfirm() {
            if (state.uploadedFiles.length === 0 && state.selectedFiles.length === 0) return;

            state.screen = 'uploading';
            state.downloadedFiles = [];
            state.analyzedFiles = [];
            state.fileContents = {};

            const driveFiles = state.files.filter(f => state.selectedFiles.includes(f.id));
            const totalFiles = state.uploadedFiles.length + driveFiles.length;
            state.uploadProgress = { current: 0, total: totalFiles + 2, message: '準備中...' };
            render();

            try {
                // RAGストア作成
                state.uploadProgress.message = 'AIインデックス作成中...';
                render();
                const storeName = 'gdrive-pro-' + Date.now();
                state.ragStoreName = await createRagStore(storeName);
                state.uploadProgress.current = 1;
                render();

                let idx = 1;
                const allContents = {};

                // ローカルファイル処理
                for (const file of state.uploadedFiles) {
                    state.uploadProgress.current = idx++;
                    state.uploadProgress.message = 'ローカルファイル解析中...';
                    state.uploadProgress.fileName = file.name;
                    render();

                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const content = await parseFileContent(arrayBuffer, file.name, file.type);
                        allContents[file.name] = content;

                        const ext = file.name.split('.').pop().toLowerCase();
                        const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'].includes(ext) || file.type?.startsWith('image/');
                        const isVideo = (['mov', 'avi', 'webm', 'mkv'].includes(ext) || file.type?.startsWith('video/')) && !file.type?.includes('mp4');

                        const contentSummary = content.length > 200
                            ? content.substring(0, 200) + '...'
                            : content;

                        state.downloadedFiles.push({
                            name: file.name,
                            contentSummary: isImage ? `🖼️ 画像ファイル (${formatFileSize(arrayBuffer.byteLength)})` :
                                isVideo ? `🎬 動画ファイル (${formatFileSize(arrayBuffer.byteLength)})` :
                                    `${content.length.toLocaleString()}文字 / ${contentSummary}`
                        });

                        state.analyzedFiles.push({
                            name: file.name,
                            contentSummary: isImage ? `🖼️ 画像 - ${formatFileSize(arrayBuffer.byteLength)}` :
                                isVideo ? `🎬 動画 - ${formatFileSize(arrayBuffer.byteLength)}` :
                                    contentSummary
                        });

                        // RAGにアップロード
                        if (isImage || isVideo) {
                            const safeName = file.name.replace(/[^\x00-\x7F]/g, '_');
                            await uploadToRagStore(state.ragStoreName, new File([arrayBuffer], safeName, { type: file.type }));
                        } else {
                            const textBlob = new Blob([content], { type: 'text/plain' });
                            const safeName = file.name.replace(/[^\x00-\x7F]/g, '_') + '.txt';
                            await uploadToRagStore(state.ragStoreName, new File([textBlob], safeName, { type: 'text/plain' }));
                        }

                        render();
                    } catch (e) {
                        console.error('Local file error:', e);
                    }
                }

                // Driveファイル並列ダウンロード（高速化）
                state.uploadProgress.message = 'Driveファイルを高速ダウンロード中...';
                render();

                // 3ファイルずつ並列処理
                const chunkSize = 3;
                for (let i = 0; i < driveFiles.length; i += chunkSize) {
                    const chunk = driveFiles.slice(i, i + chunkSize);

                    await Promise.all(chunk.map(async (driveFile) => {
                        state.uploadProgress.current = idx++;
                        state.uploadProgress.fileName = driveFile.name;
                        render();

                        try {
                            const { arrayBuffer, mimeType, fileName } = await downloadDriveFile(
                                driveFile.id,
                                driveFile.mimeType,
                                driveFile.name
                            );

                            const content = await parseFileContent(arrayBuffer, driveFile.name, mimeType);
                            allContents[driveFile.name] = content;

                            const ext = driveFile.name.split('.').pop().toLowerCase();
                            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'].includes(ext) || mimeType?.startsWith('image/');
                            const isVideo = (['mov', 'avi', 'webm', 'mkv'].includes(ext) || mimeType?.startsWith('video/')) && !mimeType?.includes('mp4');

                            const contentSummary = content.length > 200
                                ? content.substring(0, 200) + '...'
                                : content;

                            state.downloadedFiles.push({
                                name: driveFile.name,
                                contentSummary: isImage ? `🖼️ 画像ファイル (${formatFileSize(arrayBuffer.byteLength)})` :
                                    isVideo ? `🎬 動画ファイル (${formatFileSize(arrayBuffer.byteLength)})` :
                                        `${content.length.toLocaleString()}文字 / ${contentSummary}`
                            });

                            state.analyzedFiles.push({
                                name: driveFile.name,
                                contentSummary: isImage ? `🖼️ 画像 - ${formatFileSize(arrayBuffer.byteLength)}` :
                                    isVideo ? `🎬 動画 - ${formatFileSize(arrayBuffer.byteLength)}` :
                                        contentSummary
                            });

                            // RAGにアップロード
                            if (isImage || isVideo) {
                                await uploadMediaToRagStore(state.ragStoreName, arrayBuffer, driveFile.name, mimeType);
                            } else {
                                const textBlob = new Blob([content], { type: 'text/plain' });
                                const safeName = driveFile.name.replace(/[^\x00-\x7F]/g, '_') + '.txt';
                                await uploadToRagStore(state.ragStoreName, new File([textBlob], safeName, { type: 'text/plain' }));
                            }

                            render();
                        } catch (e) {
                            console.error('Drive file error:', e);
                            state.downloadedFiles.push({
                                name: driveFile.name,
                                contentSummary: `エラー: ${e.message}`
                            });
                        }
                    }));
                }

                state.fileContents = allContents;

                // 質問例生成
                state.uploadProgress.current = totalFiles + 1;
                state.uploadProgress.message = '質問例を生成中...';
                state.uploadProgress.fileName = '';
                render();

                state.exampleQuestions = await generateExampleQuestions(state.ragStoreName, allContents);

                // 学習データを更新
                state.uploadProgress.current = totalFiles + 1.5;
                state.uploadProgress.message = '分析パターンを学習中...';
                render();

                state.fileContents = allContents;
                updateLearningFromAnalysis(state.analyzedFiles, allContents);
                generateLearningInsights();

                state.uploadProgress.current = totalFiles + 2;
                state.uploadProgress.message = '完了！';
                render();
                await delay(500);

                state.screen = 'chat';
                state.chatHistory = [];
                state.showLearningPanel = true;
                render();
            } catch (e) {
                state.error = '処理失敗: ' + e.message;
                state.screen = 'error';
                render();
            }
        }

        async function handleChat(e) {
            e.preventDefault();
            const input = document.getElementById('chatInput');
            const query = input.value.trim();
            if (!query || state.isLoading) return;

            input.value = '';
            state.chatHistory.push({ role: 'user', content: query });
            state.isLoading = true;

            state.currentSessionLearning.queries.push({
                query,
                timestamp: new Date().toISOString()
            });

            render();

            try {
                const result = await fileSearch(state.ragStoreName, query);
                const sources = result.groundingChunks
                    .filter(c => c.retrievedContext?.text)
                    .map(c => c.retrievedContext.text);
                state.chatHistory.push({ role: 'assistant', content: result.text, sources });
            } catch (e) {
                state.chatHistory.push({
                    role: 'assistant',
                    content: `エラーが発生しましたが、以下の方法で情報を探せる可能性があります：\n\n1. 質問を具体的に言い換えてみてください\n2. ファイル名や特定のキーワードで検索してみてください\n3. データの種類（売上、日付、名前など）を明示してください\n\nエラー詳細: ${e.message}`,
                    sources: []
                });
            }

            state.isLoading = false;
            render();
        }

        // ===========================================
        // 初期化
        // ===========================================
        console.log('📚 資料検索AI Pro 初期化中...');

        window.addEventListener('load', async () => {
            try {
                if (GOOGLE_CLIENT_ID) {
                    await initializeGoogleAuth();
                }
            } catch (e) {
                console.warn('Google Auth init warning:', e);
            }
            render();
        });

        render();
    </script>
</body>

</html>
